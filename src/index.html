<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Church Live Translate</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <header class="controls">
        <div class="row">
          <label for="apiKey">OpenAI API Key</label>
          <input id="apiKey" type="password" placeholder="sk-..." autocomplete="off" />
          <button id="saveKey">Save Key</button>
        </div>

        <div class="row">
          <label for="audioInput">Audio Input</label>
          <select id="audioInput"></select>
          <button id="refreshDevices">Refresh</button>
          <button id="toggleRun" class="run">Start (F8)</button>
        </div>

        <div class="row">
          <label for="vadThreshold">VAD Threshold</label>
          <input id="vadThreshold" type="range" min="0.01" max="0.12" step="0.005" value="0.04" />
          <span id="vadValue">0.040</span>
          <label for="silenceMs">Silence Hold (ms)</label>
          <input id="silenceMs" type="number" min="300" max="3000" step="100" value="900" />
        </div>

        <div class="row">
          <label for="glossary">Glossary (one term per line, EN=ZH)</label>
          <textarea id="glossary" rows="3" placeholder="Holy Spirit=圣灵&#10;Grace=恩典"></textarea>
          <button id="saveGlossary">Save Glossary</button>
        </div>

        <p id="status">Idle</p>
      </header>

      <section class="captions">
        <article>
          <h2>English</h2>
          <div id="englishPanel" class="panel"></div>
        </article>
        <article>
          <h2>Simplified Chinese</h2>
          <div id="chinesePanel" class="panel"></div>
        </article>
      </section>
    </main>

    <script src="renderer.js"></script>
  </body>
</html>
