<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Church Subtitle Output</title>
    <link rel="stylesheet" href="output.css" />
  </head>
  <body>
    <main>
      <section class="captions">
        <article>
          <h2>English</h2>
          <div id="englishLive" class="live-line"></div>
          <div id="englishPanel" class="panel"></div>
        </article>
        <article>
          <h2 id="translatedHeading">Translation</h2>
          <div id="chineseLive" class="live-line"></div>
          <div id="chinesePanel" class="panel"></div>
        </article>
      </section>

      <div class="global-status-bar">
        <p id="modeSummary" class="mode-summary">Mode: stopped | Translation: stopped | Translation Mode: off | Queue: 0</p>
      </div>
    </main>

    <script src="output.js"></script>
  </body>
</html>
