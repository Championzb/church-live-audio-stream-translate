<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Church Subtitle Output</title>
    <link rel="stylesheet" href="output.css" />
  </head>
  <body>
    <main>
      <div class="projector-titlebar" aria-hidden="true"></div>
      <div class="window-frame-overlay">
        <div class="window-drag-zone window-drag-bar" data-tauri-drag-region aria-hidden="true"></div>
        <div class="window-controls floating-window-controls" data-no-drag>
          <button id="outputWindowMinimize" class="window-control-btn" type="button" aria-label="Minimize">−</button>
          <button id="outputWindowMaximize" class="window-control-btn" type="button" aria-label="Maximize">□</button>
          <button id="outputWindowClose" class="window-control-btn danger" type="button" aria-label="Close">×</button>
        </div>
      </div>
      <section id="projectorCaptions" class="captions source-hidden">
        <article id="projectorSourceArticle">
          <div class="caption-header">
            <h2>Source</h2>
          </div>
          <div id="englishLive" class="live-line"></div>
          <div id="englishPanel" class="panel"></div>
        </article>
        <article>
          <div class="caption-header">
            <h2 id="translatedHeading">Translation</h2>
            <button id="toggleProjectorSource" class="source-toggle-btn" type="button" aria-label="Toggle source panel">Source</button>
          </div>
          <div id="chineseLive" class="live-line"></div>
          <div id="chinesePanel" class="panel"></div>
        </article>
      </section>

      <div class="global-status-bar">
        <p id="modeSummary" class="mode-summary">Mode: stopped | Translation: stopped | Translation Mode: off | Queue: 0</p>
      </div>
    </main>

    <script src="output.js"></script>
  </body>
</html>
