name: Distribution

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            bundle: app
            label: macos
          - os: windows-latest
            bundle: msi
            label: windows
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Church Live Translate ${{ github.ref_name }}
          releaseBody: |
            Automated build for ${{ github.ref_name }}.

            Unsigned install steps

            macOS (`.app.zip`)
            1. Download `.app.zip`.
            2. Unzip and drag `.app` into `Applications`.
            3. First run: right-click app -> `Open` -> confirm `Open`.

            Windows (`.msi`)
            1. Download `.msi`.
            2. Run installer.
            3. If SmartScreen appears: `More info` -> `Run anyway`.
          releaseDraft: true
          prerelease: false
          args: --bundles ${{ matrix.bundle }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: church-live-translate-${{ matrix.label }}
          path: |
            src-tauri/target/release/bundle/**/*
