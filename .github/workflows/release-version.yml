name: Release Version

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  actions: write
  contents: write

jobs:
  bump-and-tag:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci

      - name: Bump npm version (no tag yet)
        run: npm version "${{ inputs.bump }}" --no-git-tag-version

      - name: Sync Tauri app version to package version
        run: |
          node -e "const fs=require('fs');const p='package.json';const t='src-tauri/tauri.conf.json';const v=JSON.parse(fs.readFileSync(p,'utf8')).version;const c=JSON.parse(fs.readFileSync(t,'utf8'));c.version=v;fs.writeFileSync(t,JSON.stringify(c,null,2)+'\n');console.log(v);"

      - name: Read new version
        id: version
        run: |
          VERSION=$(node -e 'const fs=require("node:fs");process.stdout.write(JSON.parse(fs.readFileSync("package.json","utf8")).version)')
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Ensure tag does not already exist on remote
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.version.outputs.value }}" | grep -q .; then
            echo "Tag v${{ steps.version.outputs.value }} already exists on remote."
            exit 1
          fi

      - name: Commit and tag
        run: |
          git add package.json package-lock.json src-tauri/tauri.conf.json
          git commit -m "chore(release): v${{ steps.version.outputs.value }}"
          git tag "v${{ steps.version.outputs.value }}"

      - name: Push commit and tag
        run: |
          git push origin HEAD:main
          git push origin "v${{ steps.version.outputs.value }}"

      - name: Trigger distribution workflow for new tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.value }}"
          curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/distribution.yml/dispatches" \
            -d "{\"ref\":\"${TAG}\"}"
